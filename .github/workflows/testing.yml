name: Test
on:
  push:
    branches:
          - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: install deps
        run: cd finance_backend; poetry install
      - name: test
        run: poetry run pytest
